services:
  postgres:
    image: postgres:16-alpine
    container_name: food-app-postgres
    environment:
      POSTGRES_USER: food_user
      POSTGRES_PASSWORD: food_pass
      POSTGRES_DB: food_app
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U food_user -d food_app']
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: food-app-mongo
    environment:
      MONGO_INITDB_DATABASE: food_logs
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.adminCommand("ping")']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: food-app-redis
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: food-app-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'   # S3 API
      - '9001:9001'   # Web console — truy cập http://localhost:9001
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  localstack:
    image: localstack/localstack:latest
    container_name: food-app-localstack
    ports:
      - '4566:4566'   # Tất cả AWS services qua 1 port
    environment:
      - SERVICES=s3,ssm,secretsmanager,ecs,ecr,rds,elasticache,elbv2,iam,logs,cloudwatch,sns,ec2
      - DEBUG=0
      - AWS_DEFAULT_REGION=ap-southeast-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
    volumes:
      - localstack-data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:4566/_localstack/health']
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres-data:
  mongo-data:
  redis-data:
  minio-data:
  localstack-data:
